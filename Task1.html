<!DOCTYPE html>
<html>
<head>
    <title>Web Layout</title>
</head>
<body bgcolor="#e0e0e0">

    <!-- Header -->
    <table width="100%" height="80" bgcolor="#d3d3d3">
        <tr>
            <td align="center">
                <h2>Header</h2>
            </td>
        </tr>
    </table>

    <br>

    <!-- Navigation -->
    <table width="100%" height="60" bgcolor="#d3d3d3">
        <tr>
            <td align="center">
                <h3>Navigation Menu</h3>
            </td>
        </tr>
    </table>

    <br>

    <!-- Main Section -->
    <table width="100%">
        <tr>

            <!-- Left Content -->
            <td width="20%">
                <table width="100%" height="300" bgcolor="#d3d3d3">
                    <tr>
                        <td align="center">
                            <h3>Content</h3>
                        </td>
                    </tr>
                </table>
            </td>

            <!-- Main Content -->
            <td width="60%">
                <table width="100%" height="300" bgcolor="#d3d3d3">
                    <tr>
                        <td align="center">
                            <h2>Main Content</h2>
                        </td>
                    </tr>
                </table>
            </td>

            <!-- Right Content -->
            <td width="20%">
                <table width="100%" height="300" bgcolor="#d3d3d3">
                    <tr>
                        <td align="center">
                            <h3>Content</h3>
                        </td>
                    </tr>
                </table>
            </td>

        </tr>
    </table>

    <br>

    <!-- Footer -->
    <table width="100%" height="70" bgcolor="#d3d3d3">
        <tr>
            <td align="center">
                <h3>Footer</h3>
            </td>
        </tr>
    </table>

</body>
</html>
